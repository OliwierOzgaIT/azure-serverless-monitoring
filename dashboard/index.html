<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a22;
      --border:    #252b38;
      --accent:    #3b82f6;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #eab308;
      --muted:     #6b7280;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 15px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    #clock {
      color: var(--text-dim);
      font-size: 12px;
    }

    /* ── config notice ── */
    #config-notice {
      background: #1a1200;
      border: 1px solid var(--yellow);
      color: var(--yellow);
      padding: 10px 24px;
      font-size: 12px;
      display: none;
    }

    /* ── error banner ── */
    #error-banner {
      background: #1a0000;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 24px;
      font-size: 12px;
      display: none;
    }

    /* ── summary bar ── */
    #summary {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1;
      background: var(--surface);
      padding: 16px 20px;
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-value.up    { color: var(--green); }
    .stat-value.down  { color: var(--red);   }
    .stat-value.total { color: var(--text);  }
    .stat-value.rt    { color: var(--accent); }

    /* ── grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      cursor: pointer;
      transition: background .15s;
    }
    .card:hover { background: #1c2130; }

    .card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 2px 7px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .badge.up   { background: #052e16; color: var(--green); border: 1px solid #166534; }
    .badge.down { background: #1a0000; color: var(--red);   border: 1px solid #7f1d1d; }

    .card-url {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-dim);
      font-size: 12px;
    }

    .card-meta {
      padding: 0 16px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .meta-item { }
    .meta-key {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .meta-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-top: 2px;
    }

    /* ── sparkline panel ── */
    .spark-panel {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .spark-panel.open { display: block; }
    .spark-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin: 10px 0 6px;
    }
    canvas.spark {
      display: block;
      width: 100%;
      height: 60px;
      background: var(--bg);
      border-radius: 3px;
    }
    .spark-legend {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
    }
    .spark-legend span::before {
      content: '●';
      margin-right: 4px;
    }
    .spark-legend .leg-up::before   { color: var(--green); }
    .spark-legend .leg-down::before { color: var(--red);   }

    /* ── skeleton ── */
    .skeleton {
      background: var(--surface);
      border-radius: 2px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    .skel-card { height: 100px; }

    /* ── footer ── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid var(--border);
      margin-top: 1px;
    }
  </style>
</head>
<body>

<header>
  <h1>⬡ Site Monitor</h1>
  <span id="clock"></span>
</header>

<div id="config-notice">
  ⚠ API_ENDPOINT has not been configured. Open dashboard/index.html and replace
  <code>YOUR_FUNCTION_APP_URL_HERE</code> with your Function App hostname.
</div>

<div id="error-banner"></div>

<div id="summary">
  <div class="stat">
    <div class="stat-label">Total Sites</div>
    <div class="stat-value total" id="s-total">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Operational</div>
    <div class="stat-value up" id="s-up">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Degraded</div>
    <div class="stat-value down" id="s-down">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Avg Response</div>
    <div class="stat-value rt" id="s-rt">— ms</div>
  </div>
</div>

<div id="grid"></div>

<footer id="footer">
  Auto-refreshes every 5 min &nbsp;|&nbsp; <span id="tz-time"></span>
</footer>

<script>
  const API_ENDPOINT = "https://func-sitemonitor-dev.azurewebsites.net";
  const UNCONFIGURED = API_ENDPOINT.includes("YOUR_FUNCTION_APP_URL_HERE");
  const REFRESH_MS   = 5 * 60 * 1000;

  // ── clock ──────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleTimeString("en-GB", { hour12: false });
    document.getElementById("tz-time").textContent =
      "Warsaw time: " +
      now.toLocaleString("pl-PL", {
        timeZone: "Europe/Warsaw",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── skeleton ───────────────────────────────────────────────────
  function showSkeletons() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (let i = 0; i < 5; i++) {
      const d = document.createElement("div");
      d.className = "skeleton skel-card";
      grid.appendChild(d);
    }
  }

  // ── summary bar ────────────────────────────────────────────────
  function updateSummary(sites) {
    const up   = sites.filter(s => s.current_status === "UP").length;
    const down = sites.length - up;
    const rts  = sites.filter(s => s.avg_response_ms > 0).map(s => s.avg_response_ms);
    const avg  = rts.length ? Math.round(rts.reduce((a, b) => a + b, 0) / rts.length) : 0;
    document.getElementById("s-total").textContent = sites.length;
    document.getElementById("s-up").textContent    = up;
    document.getElementById("s-down").textContent  = down;
    document.getElementById("s-rt").textContent    = avg + " ms";
  }

  // ── sparkline ──────────────────────────────────────────────────
  function drawSparkline(canvas, checks) {
    const dpr = window.devicePixelRatio || 1;
    const w   = canvas.clientWidth  || 288;
    const h   = canvas.clientHeight || 60;
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    if (!checks || checks.length === 0) {
      ctx.fillStyle = "#1e2330";
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "#6b7280";
      ctx.font = "10px monospace";
      ctx.textAlign = "center";
      ctx.fillText("no data", w / 2, h / 2 + 4);
      return;
    }

    const rts  = checks.map(c => c.response_time_ms);
    const maxRT = Math.max(...rts, 1);
    const pad   = 4;
    const step  = checks.length > 1 ? (w - pad * 2) / (checks.length - 1) : 0;

    // line
    ctx.beginPath();
    ctx.strokeStyle = "#3b82f6";
    ctx.lineWidth   = 1.5;
    checks.forEach((c, i) => {
      const x = pad + i * step;
      const y = pad + (1 - c.response_time_ms / maxRT) * (h - pad * 2);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // dots
    checks.forEach((c, i) => {
      const x = pad + i * step;
      const y = pad + (1 - c.response_time_ms / maxRT) * (h - pad * 2);
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = c.is_up ? "#22c55e" : "#ef4444";
      ctx.fill();
    });
  }

  // ── card builder ───────────────────────────────────────────────
  function buildCard(site) {
    const isUp = site.current_status === "UP";
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-header">
        <span class="badge ${isUp ? "up" : "down"}">${isUp ? "UP" : "DOWN"}</span>
        <span class="card-url" title="${site.url}">${site.url.replace(/^https?:\/\//, "")}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-key">HTTP</div>
          <div class="meta-val">${site.last_status_code ?? "—"}</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">Uptime</div>
          <div class="meta-val">${site.uptime_percent ?? 0}%</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">Avg RT</div>
          <div class="meta-val">${site.avg_response_ms > 0 ? site.avg_response_ms + " ms" : "—"}</div>
        </div>
      </div>
      <div class="spark-panel">
        <div class="spark-label">Response time — last ${site.checks.length} checks</div>
        <canvas class="spark"></canvas>
        <div class="spark-legend">
          <span class="leg-up">Healthy</span>
          <span class="leg-down">Failed</span>
        </div>
      </div>
    `;

    const panel  = card.querySelector(".spark-panel");
    const canvas = card.querySelector("canvas.spark");

    card.addEventListener("click", () => {
      const wasOpen = panel.classList.toggle("open");
      if (wasOpen) drawSparkline(canvas, site.checks);
    });

    return card;
  }

  // ── render ─────────────────────────────────────────────────────
  function render(data) {
    updateSummary(data.sites);
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    data.sites.forEach(site => grid.appendChild(buildCard(site)));
  }

  // ── fetch ──────────────────────────────────────────────────────
  async function fetchData() {
    const banner = document.getElementById("error-banner");
    banner.style.display = "none";
    try {
      const res = await fetch(API_ENDPOINT);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      banner.textContent = `⚠ Failed to load monitoring data: ${err.message}`;
      banner.style.display = "block";
    }
  }

  // ── init ───────────────────────────────────────────────────────
  if (UNCONFIGURED) {
    document.getElementById("config-notice").style.display = "block";
    // render placeholder summary so the page is not blank
    ["s-total","s-up","s-down"].forEach(id => document.getElementById(id).textContent = "—");
    document.getElementById("s-rt").textContent = "— ms";
  } else {
    showSkeletons();
    fetchData();
    setInterval(fetchData, REFRESH_MS);
  }
</script>
</body>
</html>
